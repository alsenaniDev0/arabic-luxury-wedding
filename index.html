<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="wedding-page">

        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>

        <section class="invite-card">

            <div class="top-ornament">❦</div>

            <div class="rings">{{icon}}</div>

            <p class="small-title" data-section="smallTitle">{{smallTitle}}</p>

            <h1 class="main-title" data-section="title">{{title}}</h1>

            <p class="message" data-section="message">
                {{message}}
            </p>

            <div class="names" data-section="names">
                {{names}}
            </div>

            <p class="invite-text" data-section="inviteText">
                {{inviteText}}
            </p>

            <div class="details" data-section="details">

                <div class="detail-box" data-section="date">
                    <span class="icon">📅</span>
                    <div>
                        <small>التاريخ</small>
                        <strong>{{date}}</strong>
                    </div>
                </div>

                <div class="detail-box" data-section="time">
                    <span class="icon">⏰</span>
                    <div>
                        <small>الوقت</small>
                        <strong>{{time}}</strong>
                    </div>
                </div>

                <div class="detail-box" data-section="place">
                    <span class="icon">📍</span>
                    <div>
                        <small>المكان</small>
                        <strong>{{placeTitle}}</strong>
                    </div>
                </div>

            </div>

            <a href="{{locationUrl}}" target="_blank" rel="noopener" class="location-btn" data-section="locationButton">
                عرض الموقع
            </a>

            <p class="closing" data-section="closing">
                {{closing}}
            </p>

            <div class="bottom-ornament">❦</div>

        </section>

    </main>
</body>

</html>
